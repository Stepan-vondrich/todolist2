name: CD - build & deploy to Azure

on:
  push:
    branches: [ master ]      # spustí se na každý push do master
  workflow_dispatch: {}        # + ruční spuštění tlačítkem na GitHubu

permissions:
  contents: read
  packages: write              # dovolí GITHUB_TOKEN pushnout image na GHCR

env:
  GHCR: ghcr.io/stepan-vondrich/todolist2   # jediný registr (GHCR, zdarma)
  RG: rg-containerapp-test-01
  APP: app-containerapp-01     # prod (Azure SQL)
  APP_DEV: todolist-dev        # dev (Neon Postgres)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: GHCR login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build & push image to GHCR
        run: |
          docker build -t "$GHCR:${{ github.sha }}" -t "$GHCR:latest" .
          docker push "$GHCR:${{ github.sha }}"
          docker push "$GHCR:latest"

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest      # bez gate -> nasadí se automaticky
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Ensure containerapp extension
        run: az extension add --name containerapp --only-show-errors
      - name: Deploy to DEV
        run: az containerapp update -n "$APP_DEV" -g "$RG" --image "$GHCR:${{ github.sha }}"

  deploy-prod:
    needs: deploy-dev           # do prod až po úspěšném dev
    runs-on: ubuntu-latest
    environment: production      # APPROVAL GATE – čeká na tvé odkliknutí
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Ensure containerapp extension
        run: az extension add --name containerapp --only-show-errors
      # Prod runs on Postgres (Neon) now — the app's EnsureCreated builds the schema at
      # startup, so no separate SQL migration step (and no Azure SQL) is needed.
      - name: Deploy to PROD
        run: az containerapp update -n "$APP" -g "$RG" --image "$GHCR:${{ github.sha }}"
